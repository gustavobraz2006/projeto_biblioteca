<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Painel do Leitor</title>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Painel do Leitor</h1>
      <button onclick="sair()">Sair</button>
    </div>


    <section>
      <h2>Livros Disponíveis</h2>
      <div class="table-responsive">
      <table id="tabela-livros">
        <thead>
          <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Ano</th>
            <th>Disponíveis</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="corpo-livros"></tbody>
      </table>
      </div>
    </section>


    <div id="modal-emprestimo" class="modal escondido">
      <div class="modal-conteudo">
        <h2>Solicitar Empréstimo</h2>
        <p id="modal-livro-nome"></p>
        <input type="hidden" id="modal-livro-id" />
        <label>Data de devolução prevista:</label>
        <input type="date" id="modal-data-devolucao" />
        <div class="modal-botoes">
          <button onclick="confirmarEmprestimo()">Confirmar</button>
          <button onclick="fecharModal()">Cancelar</button>
        </div>
        <p id="msg-emprestimo" class="mensagem"></p>
      </div>
    </div>


    <section>
      <h2>Meus Empréstimos</h2>
      <div class="table-responsive">
      <table id="tabela-meus-emprestimos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Livro</th>
            <th>Empréstimo</th>
            <th>Devolução Prevista</th>
            <th>Status</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="corpo-meus-emprestimos"></tbody>
      </table>
      </div>
    </section>

  </div>

  <script src="leitor.js"></script>
</body>
</html>
